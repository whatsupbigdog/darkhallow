
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darkhallow Spokane 2026</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=IM+Fell+English+SC&display=swap');

        body {
            background-color: #0d0d0d;
            color: #c0c0c0;
            font-family: 'Cinzel', serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        /* Subtle film grain texture */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.15;
            pointer-events: none;
            z-index: 1;
        }

        /* Dark Vignette Overlay */
        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0) 40%, rgba(0,0,0,0.9) 100%);
            z-index: 2;
            pointer-events: none;
        }

        .content {
            position: relative;
            z-index: 3;
            max-width: 900px;
            padding: 40px;
        }

        h1 {
            font-family: 'IM Fell English SC', serif;
            font-size: 2.8rem;
            letter-spacing: 0.1em;
            line-height: 1.2;
            margin-bottom: 0.5em;
            color: #e0e0e0;
            text-transform: uppercase;
        }

        .darkhallow {
            display: block;
            font-size: 5rem;
            color: #ffffff;
            letter-spacing: 0.2em;
            margin-top: 10px;
            text-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        .date {
            font-size: 1.4rem;
            letter-spacing: 0.5em;
            color: #666;
            margin: 40px 0;
            font-weight: 400;
        }

        .cta {
            font-size: 1.1rem;
            letter-spacing: 0.8em;
            text-transform: uppercase;
            border-top: 1px solid #333;
            padding-top: 30px;
            display: inline-block;
            color: #888;
            transition: color 1s ease;
        }

        /* Aesthetic tower silhouette hint */
        .background-monolith {
            position: absolute;
            bottom: -50px;
            right: 10%;
            font-size: 40vh;
            opacity: 0.03;
            user-select: none;
            z-index: 0;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            h1 { font-size: 1.8rem; }
            .darkhallow { font-size: 3rem; }
            .date { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="vignette"></div>
    <div class="background-monolith">†</div>
    
    <main class="content">
        <h1>There's a <span class="darkhallow">Darkhallow</span> coming to Spokane</h1>
        <div class="date">November 21, 2026</div>
        <p class="cta">Prepare yourself.</p>
    </main>
</body>
</html>
